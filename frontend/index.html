<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GenAI RAG Assistant</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header"><h2>TRUEAILAB Knowledge Base</h2></header>
        <div id="message-area" class="message-display"></div>
        <form id="chat-form" class="input-panel">
            <input type="text" id="user-input" placeholder="Ask a question..." autocomplete="off" required />
            <button type="submit">Send</button>
        </form>
    </div>
    <script src="app.js"></script>
</body>
</html>
